name: Liverpool tapte varsling (cron)

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check_liverpool:
    runs-on: ubuntu-latest

    steps:
    - name: Sjekk ut repo
      uses: actions/checkout@v3

    - name: Installer Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Installer axios
      run: npm install axios

    - name: Kjør Liverpool-sjekk (kun i dag)
      id: check
      run: |
        node check_last.js today | tee output.log
        echo "log<<EOF" >> $GITHUB_OUTPUT
        cat output.log >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Send Pushcut notification
      if: contains(steps.check.outputs.log, 'PUSHCUT_TRIGGER')
      run: curl "https://api.pushcut.io/R5brW4g13iCchU9EjQ0_u/notifications/Liverpool_tapte"
