name: Liverpool tapte varsling

on:
  schedule:
    - cron: "*/10 * * * *"   # kjører hvert 10. minutt
  workflow_dispatch:

jobs:
  check_liverpool:
    runs-on: ubuntu-latest

    steps:
    - name: Sjekk ut repo
      uses: actions/checkout@v3

    - name: Installer Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Installer axios
      run: npm install axios

    - name: Debug URL (midlertidig)
      run: echo "$PUSHCUT_URL"

    - name: Kjør Liverpool-sjekk
      run: node check_last.js

    - name: Send Pushcut notification (GET)
      if: success()
      run: curl "$PUSHCUT_URL"
