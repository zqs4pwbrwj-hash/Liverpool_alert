name: Liverpool match checker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'   # kjør hver hele time
  workflow_dispatch:

jobs:
  check-liverpool:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Liverpool checker
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        run: node liverpool-check.js
