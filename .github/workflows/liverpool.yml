name: Liverpool RSS Check

on:
  schedule:
    - cron: "0 21 * * *"   # 23:00 norsk tid (21:00 UTC)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install deps
        run: npm install rss-parser axios

      - name: Run script
        env:
          PUSHCUT_URL: ${{ secrets.PUSHCUT_URL }}
        run: node check.js
