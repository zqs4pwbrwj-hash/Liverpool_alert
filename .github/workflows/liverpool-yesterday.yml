name: Liverpool – TEST (i går)

on:
  workflow_dispatch:

jobs:
  check-liverpool-yesterday:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Liverpool checker (yesterday)
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: node liverpool-check.js yesterday
